# BotHost Configuration - Python Only
version: "1.0"

app:
  name: "IT Market Bot"
  description: "Professional Telegram platform for bot development orders"
  language: "python"
  runtime: "3.12"
  
env_variables:
  - BOT_TOKEN         # Required
  - ADMIN_IDS         # Required
  - DATABASE_URL      # Required
  - USE_WEBHOOK       # Optional: true/false
  - WEBHOOK_URL       # Optional
  
scripts:
  install: "pip install -r requirements.txt"
  start: "python3 app.py"
  
health_check:
  enabled: true
  interval: 30
  
resources:
  memory: "512MB"
  cpu: "0.5"
